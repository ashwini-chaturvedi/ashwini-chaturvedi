# Save this file to: .github/workflows/build-stats.yml
# in your GitHub profile repository (the one named ashwini-chaturvedi)

name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at midnight UTC
  workflow_dispatch:        # Also allows manual trigger from Actions tab
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit the generated SVGs back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Stats SVGs
        uses: jstrieb/github-stats@master
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          # Optional: exclude forked repos from stats
          EXCLUDED: ""
          # Optional: exclude specific repos
          EXCLUDED_REPOS: ""

      - name: Move generated files to /stats folder
        run: |
          mkdir -p stats
          mv generated/overview.svg stats/overview.svg  || true
          mv generated/languages.svg stats/languages.svg || true

      - name: Commit & push updated stats
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          git diff --cached --quiet || git commit -m "chore: update github stats [skip ci]"
          git push
