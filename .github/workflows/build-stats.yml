# Save this to: .github/workflows/build-stats.yml

name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 0 * * *"    # Runs daily at midnight UTC
  workflow_dispatch:         # Manual trigger from Actions tab
  push:
    branches: [main]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Overview Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          filename: stats/overview.svg
          user: ashwini-chaturvedi
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          base_indepth: yes

      - name: Generate Language Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          filename: stats/languages.svg
          user: ashwini-chaturvedi
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          config_timezone: Asia/Kolkata
